name: atomic-design-checker
version: 1.0.0
description: Valida se a estrutura de componentes segue o Atomic Design
tags: ["frontend", "atomic-design", "clean-architecture"]

detectors:
  filePatterns: ["src/components/**/*.tsx", "src/components/**/*.jsx"]
  languages: ["typescript", "javascript"]

capabilities:
  - name: validate_structure
    description: Analisa a categorização de componentes em atoms, molecules e organisms
    inputSchema:
      type: object
      properties:
        componentPath:
          type: string
          description: Caminho do componente para validar
