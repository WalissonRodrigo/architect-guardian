name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Create Release with Auto-Changelog
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate Changelog
        id: changelog
        uses: Jay-K-Most/changelog-generator-action@v1.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 🛡️ Architect Guardian - Status da Release
            
            Esta release contém as últimas evoluções do Architect Guardian. 
            O objetivo é garantir a integridade estrutural do seu projeto através de inteligência artificial e protocolos MCP.
            
            ### 📝 O que mudou nesta versão?
            ${{ steps.changelog.outputs.changelog }}
            
            ### 🚀 Próximos Passos
            - [ ] Publicação oficial na VS Code Marketplace (Meta: v1.0.0)
            - [ ] Expansão de Skills de arquitetura (Clean Arch, Hexagonal)
            
            ---
            *Release gerada automaticamente via GitHub Actions.*
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true

  # Job 2: Build and Publish VS Code Extension
  publish-vscode:
    name: Build & Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build All
        run: npm run build
      
      - name: Package VSIX
        run: |
          cd apps/vscode-extension
          npm run vsix
      
      - name: Upload VSIX to Release
        uses: softprops/action-gh-release@v1
        with:
          files: apps/vscode-extension/*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Publish to VS Code Marketplace
        if: "!contains(github.ref, 'beta') && !contains(github.ref, 'alpha') && env.VSCE_PAT != ''"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd apps/vscode-extension
          npx vsce publish -p ${{ secrets.VSCE_PAT }}
      
      - name: Publish to Open VSX
        if: "!contains(github.ref, 'beta') && !contains(github.ref, 'alpha') && env.OVSX_PAT != ''"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          cd apps/vscode-extension
          npx ovsx publish -p ${{ secrets.OVSX_PAT }}

  # Job 3: Publish NPM Packages
  publish-npm:
    name: Publish NPM Packages
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build All
        run: npm run build
      
      - name: Publish packages
        run: |
          # Publicar shared-types
          cd packages/shared-types
          npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
