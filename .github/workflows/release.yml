name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Create Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}

  # Job 2: Publish VS Code Extension
  publish-vscode:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Publish to VS Code Marketplace
        if: "!contains(github.ref, 'beta') && !contains(github.ref, 'alpha')"
        run: |
          cd apps/vscode-extension
          npx vsce publish -p ${{ secrets.VSCE_PAT }}
      
      - name: Publish to Open VSX
        if: "!contains(github.ref, 'beta') && !contains(github.ref, 'alpha')"
        run: |
          cd apps/vscode-extension
          npx ovsx publish -p ${{ secrets.OVSX_PAT }}

  # Job 3: Publish NPM Packages
  publish-npm:
    name: Publish NPM Packages
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Publish packages
        run: |
          # Publicar shared-types
          cd packages/shared-types
          npm publish --access public || true
          
          # Publicar skill-schema (quando existir)
          # cd packages/skill-schema
          # npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Job 4: Publish MCP Server Binary
  publish-mcp-server:
    name: Publish MCP Server
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: |
          cd apps/mcp-server
          npm run build
      
      - name: Package
        run: |
          cd apps/mcp-server
          npm pack
      
      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./apps/mcp-server/*.tgz
          asset_name: architect-guardian-mcp-server.tgz
          asset_content_type: application/gzip
